<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="dark">
  <title>Script Workspace</title>
  <style>
    html,body{margin:0;width:100%;height:100%;font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:#0f1419;color:#d9e2ec;overflow:auto;color-scheme:dark}
    #root{width:100%;height:100%;min-height:100%;padding:0;display:flex;flex-direction:column;overflow:hidden}
    #root>:only-child{width:100%;flex:1 1 auto;min-height:0}
    .ws-empty{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:#8fa3b8;font-size:13px;line-height:1.6;padding:24px;background:#0f1419}
    .ws-error{white-space:pre-wrap;color:#ffb4ad;background:#2a1518;border:1px solid #74343a;border-radius:6px;margin:10px;padding:10px;font-size:12px;line-height:1.5}
    .ws-menu{padding:14px;display:flex;flex-direction:column;gap:8px;background:#0f1419}
    .ws-menu::before{content:"脚本菜单";font-weight:700;color:#d9e2ec;margin-bottom:4px}
    .ws-menu-btn{height:34px;border:1px solid #32465a;border-radius:6px;background:#16212d;color:#d9e2ec;cursor:pointer;font-size:13px;text-align:left;padding:0 10px}
    .ws-menu-btn:hover{background:#203044;border-color:#477092}
    .ws-note{position:fixed;right:10px;top:10px;max-width:260px;background:#172534;color:#eef5fb;border:1px solid #38536d;border-radius:6px;padding:8px 10px;font-size:12px;z-index:999999;box-shadow:0 8px 20px rgba(0,0,0,.3)}
  </style>
</head>
<body>
  <div id="root"><div class="ws-empty">等待脚本界面</div></div>
  <script src="script_workspace.js"></script>
</body>
</html>
