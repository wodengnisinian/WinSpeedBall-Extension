<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>AI 回复</title>
  <style>
    :root{--c-bg:#09111a;--c-panel:#101c28;--c-card:#142331;--c-card-hover:#182a3a;--c-border:#2a4052;--c-text:#dce8f1;--c-strong:#f0f6fb;--c-muted:#8ca0b3;--c-accent:#78c1ec;--c-accent-bg:#225f88;--c-accent-hover:#2b709d}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;color-scheme:dark}body{padding:7px 6px 6px;background:var(--c-bg);color:var(--c-text);font:12px/1.45 "Segoe UI","Microsoft YaHei",sans-serif}
    .reply-card{position:relative;width:100%;height:100%;min-width:0;display:flex;flex-direction:column;padding:6px;border:1px solid var(--c-border);border-radius:8px;background:var(--c-panel);box-shadow:0 6px 18px rgba(2,8,14,.2)}.reply-tail{position:absolute;top:-9px;left:calc(50% - 7px);width:14px;height:14px;border-left:1px solid var(--c-border);border-top:1px solid var(--c-border);background:var(--c-panel);transform:rotate(45deg)}
    .reply-head{display:flex;align-items:center;min-width:0;gap:5px;margin-bottom:5px}.reply-title{flex:1;min-width:0;color:var(--c-accent);font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.reply-shortcut{flex:0 0 auto;padding:1px 5px;border:1px solid var(--c-border);border-radius:999px;background:var(--c-card);color:var(--c-muted);font-size:9px;line-height:1.5}.close-btn{flex:0 0 24px;width:24px;height:24px;padding:0;border:0;border-radius:5px;background:transparent;color:var(--c-muted);cursor:pointer;font-size:17px;line-height:1}.close-btn:hover{background:var(--c-card-hover);color:var(--c-strong)}
    .reply-content{flex:1;min-width:0;min-height:0;overflow:auto;overscroll-behavior:contain;padding:6px 7px;border:1px solid var(--c-border);border-radius:6px;background:var(--c-card);color:var(--c-strong);white-space:pre-wrap;overflow-wrap:anywhere;user-select:text;scrollbar-width:thin}.reply-actions{display:flex;align-items:center;min-width:0;gap:5px;margin-top:5px}.copy-btn{flex:0 0 auto;min-width:78px;height:28px;padding:0 10px;border:1px solid #367da8;border-radius:6px;background:var(--c-accent-bg);color:var(--c-strong);cursor:pointer;font-size:11px;font-weight:700}.copy-btn:hover{background:var(--c-accent-hover)}.copy-btn:disabled{cursor:default;opacity:.5}.copy-status{flex:1;min-width:0;color:var(--c-muted);font-size:9px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .close-btn:focus-visible,.copy-btn:focus-visible,.reply-content:focus-visible{outline:2px solid var(--c-accent);outline-offset:2px}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--c-panel)}::-webkit-scrollbar-thumb{background:#30485d;border-radius:999px}
  </style>
</head>
<body>
  <main class="reply-card" role="dialog" aria-labelledby="replyTitle">
    <div class="reply-tail"></div>
    <div class="reply-head"><div class="reply-title" id="replyTitle">AI 回复</div><div class="reply-shortcut">Alt+M</div><button class="close-btn" id="closeBtn" type="button" aria-label="关闭回复">&#215;</button></div>
    <div class="reply-content" id="replyContent" tabindex="0">正在读取回复...</div>
    <div class="reply-actions"><button class="copy-btn" id="copyBtn" type="button">复制回复</button><div class="copy-status" id="copyStatus" role="status" aria-live="polite">可选择文字，或按 Alt+M 复制</div></div>
  </main>
  <script src="ai_reply.js"></script>
</body>
</html>
